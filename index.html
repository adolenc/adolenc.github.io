<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Andrej Dolenc</title>
    <link rel="icon" type="image/png" href="favicon.png">

    <meta name="theme-color" content="#AAAAAA">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap">
    <script type="text/javascript">
      document.addEventListener("DOMContentLoaded", function(event) {
        var noCursor = document.createElement('style');
        noCursor.textContent = '* { cursor: none !important; }';
        document.head.appendChild(noCursor);
        // Finish the link hover animations even if the mouse moves away
        for (const link of document.getElementsByTagName('a')) {
          link.addEventListener('mouseover', function(e) {
            link.classList.add('chromatic-aberration-animation');
          });
          link.addEventListener('animationend', function(e) {
            link.classList.remove('chromatic-aberration-animation');
          });
        }

        // Cursor glow
        const glow = document.createElement('div');
        glow.id = 'cursor-glow';
        document.body.appendChild(glow);

        let glowX = 0, glowY = 0, targetGlowX = 0, targetGlowY = 0, glowInited = false;
        let overLink = false, stillSince = 0;
        document.addEventListener('mousemove', (e) => {
          targetGlowX = e.clientX;
          targetGlowY = e.clientY;
          if (!glowInited) { glowX = targetGlowX; glowY = targetGlowY; glowInited = true; }
          glow.style.opacity = '1';
          if (!overLink) ball.style.opacity = '1';
          stillSince = performance.now();
        });
        document.addEventListener('mouseleave', () => {
          glow.style.opacity = '0';
        });

        function updateGlow() {
          glowX += (targetGlowX - glowX) * 0.12;
          glowY += (targetGlowY - glowY) * 0.12;
          glow.style.transform = 'translate(calc(' + glowX + 'px - 50%), calc(' + glowY + 'px - 50%))';
          requestAnimationFrame(updateGlow);
        }
        updateGlow();

        // Cursor ball
        const ball = document.createElement('div');
        ball.id = 'cursor-ball';
        ball.style.opacity = '0';
        document.body.appendChild(ball);

        let ballX = 0, ballY = 0, ballScale = 1, ballAlpha = 0.1, ballInited = false;
        function updateBall() {
          if (!ballInited) { ballX = targetGlowX; ballY = targetGlowY; }
          var dx = targetGlowX - ballX, dy = targetGlowY - ballY;
          ballX += dx * 0.35;
          ballY += dy * 0.35;
          if (!ballInited && (targetGlowX !== 0 || targetGlowY !== 0)) ballInited = true;
          var now = performance.now();
          var stillDelay = 1000;
          if (now - stillSince < stillDelay) {
            ballScale += (0.25 - ballScale) * 0.35;
            ballAlpha += (0.6 - ballAlpha) * 0.35;
          } else {
            ballScale += (2 - ballScale) * 0.002;
            ballAlpha += (0 - ballAlpha) * 0.01;
          }
          ball.style.transform = 'translate(calc(' + ballX + 'px - 50%), calc(' + ballY + 'px - 50%)) scale(' + ballScale + ')';
          ball.style.background = 'rgba(255, 255, 255, ' + ballAlpha + ')';
          requestAnimationFrame(updateBall);
        }
        updateBall();

        document.addEventListener('mouseleave', () => {
          overLink = false;
          ball.style.opacity = '0';
        });
        document.addEventListener('mouseenter', (e) => {
          glowX = e.clientX; glowY = e.clientY;
          targetGlowX = e.clientX; targetGlowY = e.clientY;
          ballX = e.clientX; ballY = e.clientY;
          glow.style.opacity = '1';
          ball.style.opacity = '1';
        });
        for (const link of document.querySelectorAll('a')) {
          link.addEventListener('mousemove', function(e) {
            const rect = link.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;
            link.style.transform = 'translate(' + (x * 0.3) + 'px, ' + (y * 0.5) + 'px)';
          });
          link.addEventListener('mouseenter', function() {
            overLink = true;
            ball.style.opacity = '0';
          });
          link.addEventListener('mouseleave', function() {
            overLink = false;
            link.style.transform = '';
            ball.style.opacity = '1';
          });
        }
      });
    </script>
    <script type="text/javascript" src="./beziers.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            height: 100%;
            overflow: hidden;
            background-color: #CCC;
            background-image: linear-gradient(125deg, rgb(0 255 249 / 15%) 0%, rgb(255 0 0 / 15%) 50%, rgb(231 255 0 / 15%) 100%);
            background-size: 400% 400%;
            animation: gradient-shift 15s ease infinite;
        }

        body {
            height: 100%;
            font-family: 'Roboto', sans-serif;
            min-width: min-content;
            color: white;
        }

        #canvas {
            width: 22em;
            height: 22em;
            z-index: -1;
            margin-bottom: 40px;
            padding-top: 20px;
        }

        .container {
            white-space: nowrap;
            min-width: min-content;
            position: absolute;
            bottom: 50%;
            left: 50%;
            width: fit-content;
            transform: translate(-50%, 50%);
            color: white;
            text-shadow: 0ch 0ch 1.5ch #555;
            padding-bottom: 50px;
            transition: bottom 1.0s ease, padding-bottom 1.0s ease, transform 1.0s ease;
        }

        h1 {
            margin-bottom: 0.2em;
            font-size: 3.3em;
            z-index: 2;
            background: linear-gradient(90deg, #FFF 0%, hsl(50deg 74.28% 75.51% / 84%) 30%, hsl(170deg 71.25% 79.95% / 90%) 70%, #FFF 100%);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
        }

        h2 {
            font-size: 1.7em;
            margin-bottom: 1.5em;
            z-index: 2;
        }

        p {
            font-size: 1.5em;
            margin-bottom: 0.7em;
            z-index: 2;
        }

        @media screen and (max-height: 850px) {
            #canvas {
                margin-bottom: 0px;
            }

            .container {
                bottom: 0px;
                padding-bottom: 0px;
                transform: translate(-50%, 0%);
            }
        }

        @media screen and (max-height: 650px) {
            #canvas {
                position: absolute;
                bottom: 0;
                opacity: 0.4;
                margin-bottom: 0px;
            }

            .container {
                bottom: 0px;
                padding-bottom: 0px;
                transform: translate(-50%, 0%);
            }
        }

        a {
            color: white;
            text-decoration: underline;
            position: relative;
            display: inline-block;
            transition: transform 0.25s cubic-bezier(0.23, 1, 0.32, 1), background-color 0.2s ease, padding 0.2s ease, margin 0.2s ease;
            border-radius: 8px;
        }

        a:hover {
            animation: chromatic-aberration 0.5s ease-in-out;
            text-shadow: 0 0 8px hsla(0, 0%, 100%, 0.4);
            background-color: rgba(255, 255, 255, 0.2);
            padding: 2px 8px;
            margin: -2px -8px;
        }

        .chromatic-aberration-animation {
            animation: chromatic-aberration 0.5s ease-in-out;
        }

        @keyframes chromatic-aberration {
            0% {
                text-shadow:
                  -18px 0 2px hsla(50, 100%, 70%, 0.7),
                   18px 0 2px hsla(170, 100%, 70%, 0.7);
            }
            35% {
                text-shadow:
                  -3px 0 5px hsla(50, 100%, 75%, 0.9),
                   3px 0 5px hsla(170, 100%, 75%, 0.9);
            }
            50% {
                text-shadow:
                  0 0 8px hsla(50, 100%, 90%, 0.6),
                  0 0 8px hsla(170, 100%, 90%, 0.6);
            }
            65% {
                text-shadow:
                   3px 0 5px hsla(50, 100%, 75%, 0.5),
                  -3px 0 5px hsla(170, 100%, 75%, 0.5);
            }
            100% {
                text-shadow:
                   18px 0 2px hsla(50, 100%, 70%, 0),
                  -18px 0 2px hsla(170, 100%, 70%, 0);
            }
        }

        ::selection {
            background: #fffea0;
            color: #444;
            text-shadow: 0ch 0ch 0ch #fff;
        }

        @keyframes gradient-shift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes shimmer {
            0%, 100% { background-position: 200% 50%; }
            50% { background-position: 0% 50%; }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @keyframes text-reveal {
            from {
                opacity: 0;
                transform: translateY(60px);
                filter: blur(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        @keyframes h1-reveal {
            from {
                opacity: 0;
                transform: translateY(60px);
                filter: blur(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0) drop-shadow(0 0 28px rgba(255, 255, 255, 0.55)) drop-shadow(0 4px 16px rgba(0, 0, 0, 0.45));
            }
        }

        .container h1,
        .container h2,
        .container p {
            opacity: 0;
            transform: translateY(60px);
            animation: text-reveal 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        .container h1 {
            animation: h1-reveal 0.8s cubic-bezier(0.23, 1, 0.32, 1) 0.2s forwards, shimmer 20s ease-in-out 1.5s infinite;
        }
        .container h2 {
            animation-delay: 0.4s;
        }
        .container p:nth-of-type(1) { animation-delay: 1.1s; }
        .container p:nth-of-type(2) { animation-delay: 1.4s; }
        .container p:nth-of-type(3) { animation-delay: 1.7s; }

        #cursor-ball {
            position: fixed;
            left: 0;
            top: 0;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.6);
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 4;
            will-change: transform;
            transition: opacity 0.2s ease;
        }

        #cursor-glow {
            position: fixed;
            left: 0;
            top: 0;
            width: 700px;
            height: 700px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.15) 0%, transparent 70%);
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 3;
            will-change: transform;
            transition: opacity 0.3s ease;
            opacity: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.28) 100%);
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="canvas"></canvas>
        <h1>Andrej Dolenc</h1>
        <h2>Software engineer</h2>
        <p>Check out my <a href="CV_Andrej_Dolenc_SWE_2025.pdf">CV</a></p>
        <p>See what I'm up to on <a href="https://github.com/adolenc/">Github</a></p>
        <p>Connect with me on <a href="https://www.linkedin.com/in/adolenc/">LinkedIn</a></p>
    </div>
</body>
</html>
