<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andrej Dolenc</title>
    <link rel="icon" type="image/png" href="favicon.png">

    <script type="text/javascript">
      document.addEventListener("DOMContentLoaded", function(event) {
        // Finish the link hover animations even if the mouse moves away
        for (const link of document.getElementsByTagName('a')) {
          link.addEventListener('mouseover', function(e) {
            link.classList.add('chromatic-aberration-animation');
          });
          link.addEventListener('animationend', function(e) {
            link.classList.remove('chromatic-aberration-animation');
          });
        }

        // Cursor glow that follows the mouse
        const glow = document.createElement('div');
        glow.id = 'cursor-glow';
        document.body.appendChild(glow);

        document.addEventListener('mousemove', (e) => {
          glow.style.left = e.clientX + 'px';
          glow.style.top = e.clientY + 'px';
          glow.style.opacity = '1';
        });
        document.addEventListener('mouseleave', () => {
          glow.style.opacity = '0';
        });

        // Magnetic links — links pull toward the cursor on hover
        for (const link of document.querySelectorAll('a')) {
          link.addEventListener('mousemove', function(e) {
            const rect = link.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;
            link.style.transform = 'translate(' + (x * 0.3) + 'px, ' + (y * 0.5) + 'px)';
          });
          link.addEventListener('mouseleave', function() {
            link.style.transform = '';
          });
        }
      });
    </script>
    <script type="text/javascript" src="./beziers.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            background: linear-gradient(125deg, rgb(0 255 249 / 15%) 0%, rgb(255 0 0 / 15%) 50%, rgb(231 255 0 / 15%) 100%);
            background-size: 400% 400%;
            animation: gradient-shift 15s ease infinite;
        }

        body {
            font-family: 'Roboto', sans-serif;
            min-width: min-content;
            color: white;
        }

        #canvas {
            width: 500px;
            height: 500px;
            z-index: -3;
            margin-bottom: 40px;
            transition: all 1.0s ease;
        }

        .container {
            white-space: nowrap;
            min-width: min-content;
            position: absolute;
            bottom: 50%;
            left: 50%;
            width: fit-content;
            transform: translate(-50%, 50%);
            color: white;
            text-shadow: 0ch 0ch 1.5ch #555;
            padding-bottom: 50px;
            transition: all 1.0s ease;
        }

        h1 {
            margin-bottom: 0.2em;
            font-size: 3.3em;
            z-index: 2;
        }

        h2 {
            font-size: 1.7em;
            margin-bottom: 1.5em;
            z-index: 2;
        }

        p {
            font-size: 1.5em;
            margin-bottom: 0.7em;
            z-index: 2;
        }

        @media screen and (max-height: 850px) {
            #canvas {
                margin-bottom: 0px;
            }

            .container {
                bottom: 0px;
                padding-bottom: 0px;
                transform: translate(-50%, 0%);
            }
        }

        @media screen and (max-height: 650px) {
            #canvas {
                position: absolute;
                bottom: 0;
                opacity: 0.4;
                margin-bottom: 0px;
            }

            .container {
                bottom: 0px;
                padding-bottom: 0px;
                transform: translate(-50%, 0%);
            }
        }

        a {
            color: white;
            text-decoration: underline;
            position: relative;
            display: inline-block;
            transition: transform 0.25s cubic-bezier(0.23, 1, 0.32, 1);
        }

        a:hover {
            animation: chromatic-aberration 0.2s ease-in-out;
        }

        .chromatic-aberration-animation {
            animation: chromatic-aberration 0.2s ease-in-out;
        }

        @keyframes chromatic-aberration {
            0% {
                text-shadow: 0 0 0 black;
            }
            15% {
                text-shadow:
                  -0.10ch 0ch 0.08ch rgba(255, 255, 0, 1.0),
                   0.10ch 0ch 0.08ch rgba(0,   255, 0, 0.8),
                   0.50ch 0ch 0.02ch rgba(255, 90, 90, 0.8),
                  -0.50ch 0ch 0.02ch rgba(90, 90, 255, 0.8);
            }
            40% {
                text-shadow:
                   0.06ch 0ch 0.08ch rgba(255, 255, 0, 1.0),
                  -0.06ch 0ch 0.08ch rgba(0,   255, 0, 0.8),
                  -0.30ch 0ch 0.02ch rgba(255, 90, 90, 0.8),
                   0.30ch 0ch 0.02ch rgba(90, 90, 255, 0.8);
            }
            100% {
                text-shadow: 0 0 0 black;
            }
        }

        ::selection {
            background: #fffea0;
            color: #444;
            text-shadow: 0ch 0ch 0ch #fff;
        }

        @keyframes gradient-shift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes text-reveal {
            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        .container h1,
        .container h2,
        .container p {
            opacity: 0;
            transform: translateY(20px);
            filter: blur(8px);
            animation: text-reveal 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        .container h1 { animation-delay: 0.2s; }
        .container h2 { animation-delay: 0.4s; }
        .container p:nth-of-type(1) { animation-delay: 0.6s; }
        .container p:nth-of-type(2) { animation-delay: 0.75s; }
        .container p:nth-of-type(3) { animation-delay: 0.9s; }

        #cursor-glow {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.07) 0%, transparent 70%);
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: -1;
            transition: left 0.15s ease-out, top 0.15s ease-out, opacity 0.3s ease;
            opacity: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="canvas"></canvas>
        <h1>Andrej Dolenc</h1>
        <h2>Software engineer</h2>
        <p>Check out my <a href="CV_Andrej_Dolenc_SWE_2025.pdf">CV</a></p>
        <p>See what I'm up to on <a href="https://github.com/adolenc/">Github</a></p>
        <p>Connect with me on <a href="https://www.linkedin.com/in/adolenc/">LinkedIn</a></p>
    </div>
</body>
</html>
